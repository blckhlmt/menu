<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #111; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .menu-wrap {
      width: 100%;
      max-width: 900px;
    }
    .menu-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .menu-wrap img + img {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="menu-wrap">
    <!-- Fotoğraflar bu isimlerle olmalı: menu.jpg ve menu2.jpg -->
    <!-- Güncellemek için: aynı isimle yeni fotoğrafı üzerine yükle -->
    <img src="menu.jpg" alt="Menü 1">
    <img src="menu2.jpg" alt="Menü 2">
  </div>
</body>
</html>
